name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*' # Trigger on tags starting with v (e.g., v1.0.0)
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Create release with tag (leave empty for no release, e.g., v1.0.1)'
        required: false
        type: string

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install NPM Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Setup Java (JDK 21)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.14.3'
        validate-wrappers: false

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build Debug APK
      run: |
        cd android
        gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: whale-ai-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
      with:
        tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
        name: Release ${{ github.event.inputs.release_tag || github.ref_name }}
        target_commitish: ${{ github.sha }}
        files: android/app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
